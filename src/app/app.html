<main class="page-shell">
  <section class="scene" aria-label="Cute sheep with a smile and joke speech bubble">
    <div class="glow glow-one" aria-hidden="true"></div>
    <div class="glow glow-two" aria-hidden="true"></div>
    <div class="cloud cloud-one" aria-hidden="true"></div>
    <div class="heart heart-one" aria-hidden="true"></div>
    <div class="heart heart-two" aria-hidden="true"></div>
    <div class="heart heart-three" aria-hidden="true"></div>
    <div class="heart heart-four" aria-hidden="true"></div>
    <div class="sparkle sparkle-one" aria-hidden="true"></div>
    <div class="sparkle sparkle-two" aria-hidden="true"></div>
    <div class="sparkle sparkle-three" aria-hidden="true"></div>
    <div class="dot dot-one" aria-hidden="true"></div>
    <div class="dot dot-two" aria-hidden="true"></div>
    <div class="dot dot-three" aria-hidden="true"></div>

    <div class="speech-bubble">
      <p>Why did the sheep cross the road? To prove it wasn't a chicken.</p>
    </div>

    <div class="sheep is-smiling" aria-hidden="true">
      <div class="sheep-ear left"></div>
      <div class="sheep-ear right"></div>
      <div class="sheep-head">
        <div class="sheep-eye left">
          <span class="eye-shine"></span>
        </div>
        <div class="sheep-eye right">
          <span class="eye-shine"></span>
        </div>
        <div class="sheep-face">
          <div class="sheep-nose"></div>
          <div class="sheep-mouth"></div>
        </div>
        <div class="sheep-cheek left"></div>
        <div class="sheep-cheek right"></div>
      </div>
      <div class="sheep-body">
        <div class="sheep-arm left"></div>
        <div class="sheep-arm right"></div>
        <div class="sheep-leg left"></div>
        <div class="sheep-leg right"></div>
        <div class="sheep-belly"></div>
      </div>
    </div>
  </section>
</main>
