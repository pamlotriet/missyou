<main class="page-shell">
  <section class="scene" aria-label="Cute bear with a speech bubble">
    <div class="glow glow-one" aria-hidden="true"></div>
    <div class="glow glow-two" aria-hidden="true"></div>
    <div class="cloud cloud-one" aria-hidden="true"></div>
    <div class="heart heart-one" aria-hidden="true"></div>
    <div class="heart heart-two" aria-hidden="true"></div>
    <div class="heart heart-three" aria-hidden="true"></div>
    <div class="heart heart-four" aria-hidden="true"></div>
    <div class="sparkle sparkle-one" aria-hidden="true"></div>
    <div class="sparkle sparkle-two" aria-hidden="true"></div>
    <div class="sparkle sparkle-three" aria-hidden="true"></div>
    <div class="dot dot-one" aria-hidden="true"></div>
    <div class="dot dot-two" aria-hidden="true"></div>
    <div class="dot dot-three" aria-hidden="true"></div>

    <div class="speech-bubble">
      <p>I miss your face</p>
    </div>

    <section class="music-card" aria-label="Song player">
      <button
        type="button"
        class="music-button"
        (click)="togglePlayback()"
        [attr.aria-pressed]="isPlaying"
      >
        {{ isPlaying ? 'Pause' : 'Play' }}
      </button>

      <p *ngIf="playbackError" class="music-error">{{ playbackError }}</p>

      <audio
        #player
        preload="metadata"
        (play)="syncPlaybackState()"
        (pause)="syncPlaybackState()"
        (ended)="syncPlaybackState()"
      >
        <source [src]="songUrl" type="audio/mpeg" />
      </audio>
    </section>

    <div class="bear" aria-hidden="true">
      <div class="bear-ear left"></div>
      <div class="bear-ear right"></div>
      <div class="bear-head">
        <div class="bear-eye left">
          <span class="eye-shine"></span>
        </div>
        <div class="bear-eye right">
          <span class="eye-shine"></span>
        </div>
        <div class="bear-snout">
          <div class="bear-nose"></div>
          <div class="bear-mouth"></div>
        </div>
        <div class="bear-blush left"></div>
        <div class="bear-blush right"></div>
      </div>
      <div class="bear-body">
        <div class="bear-arm left"></div>
        <div class="bear-arm right"></div>
        <div class="bear-leg left"></div>
        <div class="bear-leg right"></div>
        <div class="bear-belly"></div>
      </div>
    </div>
  </section>
</main>
